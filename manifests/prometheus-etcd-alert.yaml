# Prometheus alerting rules for etcd MVCC monitoring
# Deploy to your Prometheus instance or use with kube-prometheus-stack
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: etcd-mvcc-alerts
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
  - name: etcd-mvcc
    rules:
    # Alert when etcd is 50% full — you have days to act
    - alert: EtcdDatabaseSizeWarning
      expr: |
        etcd_mvcc_db_total_size_in_bytes / etcd_server_quota_backend_bytes > 0.5
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "etcd database is {{ $value | humanizePercentage }} full"
        description: >
          etcd on {{ $labels.instance }} is over 50% of quota.
          Investigate high-frequency object updates (check audit logs for
          verb=patch grouped by user-agent).
        runbook: "https://github.com/hstiwana/kubecon-2026-etcd-mvcc#recovery"

    # Alert when etcd is 75% full — incident imminent
    - alert: EtcdDatabaseSizeCritical
      expr: |
        etcd_mvcc_db_total_size_in_bytes / etcd_server_quota_backend_bytes > 0.75
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "etcd database is {{ $value | humanizePercentage }} full — incident imminent"
        description: >
          etcd on {{ $labels.instance }} is over 75% of quota.
          The cluster will go read-only when quota is exceeded.
          Immediate action required: identify and stop the source of writes.

    # Alert on compaction lag — revisions piling up
    - alert: EtcdCompactionLag
      expr: |
        (etcd_mvcc_db_total_size_in_bytes - etcd_mvcc_db_total_size_in_use_in_bytes)
        / etcd_mvcc_db_total_size_in_bytes > 0.5
      for: 15m
      labels:
        severity: warning
      annotations:
        summary: "etcd has >50% dead revisions — compaction falling behind"
        description: >
          More than half of etcd storage is old revisions waiting for compaction.
          This indicates write rate exceeds compaction rate. Consider reducing
          update frequency or triggering manual defragmentation.

    # Alert on high write rate — early warning
    - alert: EtcdHighWriteRate
      expr: |
        rate(etcd_mvcc_put_total[5m]) > 100
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "etcd write rate is {{ $value }}/s — unusually high"
        description: >
          Sustained write rate above 100/s. Check for controllers with
          aggressive reconcile loops or operators patching status too frequently.
