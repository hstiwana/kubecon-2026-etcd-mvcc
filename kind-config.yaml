# kind cluster config with reduced etcd quota for demo purposes
# This makes the MVCC exhaustion reproducible in ~2 minutes instead of days
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: etcd-mvcc-demo
nodes:
- role: control-plane
  kubeadmConfigPatches:
  - |
    kind: ClusterConfiguration
    etcd:
      local:
        extraArgs:
          # 100MB quota — small enough to fill quickly during demo
          quota-backend-bytes: "104857600"
          # Aggressive auto-compaction so we can show it's not enough
          auto-compaction-mode: periodic
          auto-compaction-retention: "30s"
- role: worker
- role: worker
